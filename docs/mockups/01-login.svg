<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050E22"/>
      <stop offset="0.55" stop-color="#0E2A56"/>
      <stop offset="1" stop-color="#050E22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCE45"/>
      <stop offset="0.5" stop-color="#FDB913"/>
      <stop offset="1" stop-color="#E09A00"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#4D9DE0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4D9DE0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- phone frame -->
  <rect x="4" y="4" width="312" height="652" rx="34" fill="url(#bg)" stroke="#1d2b45" stroke-width="2"/>
  <rect x="4" y="4" width="312" height="652" rx="34" fill="url(#glow)"/>
  <!-- status bar -->
  <text x="26" y="34" fill="#ffffff" font-size="11" font-weight="700">9:41</text>
  <text x="270" y="34" fill="#ffffff" font-size="10">▮▮▮ ▾</text>

  <!-- logo emblem -->
  <g transform="translate(160,96)">
    <polygon points="-26,14 -10,-18 6,14" fill="#4D9DE0"/>
    <polygon points="-8,14 8,-18 24,14" fill="#FDB913"/>
    <text x="0" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="900" letter-spacing="2">FBLA</text>
  </g>

  <!-- heading -->
  <text x="160" y="178" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">Welcome back</text>
  <rect x="132" y="190" width="56" height="3" rx="1.5" fill="#4D9DE0"/>
  <text x="160" y="214" text-anchor="middle" fill="#ffffff" fill-opacity="0.62" font-size="11">Sign in to your FBLA member account</text>

  <!-- card -->
  <rect x="26" y="236" width="268" height="300" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="26" y="236" width="268" height="3" rx="1.5" fill="#4D9DE0"/>

  <!-- email field -->
  <text x="44" y="266" fill="#ffffff" fill-opacity="0.72" font-size="11" font-weight="600">Email</text>
  <rect x="44" y="274" width="232" height="46" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#4D9DE0" stroke-opacity="0.9"/>
  <circle cx="62" cy="297" r="7" fill="none" stroke="#4D9DE0" stroke-width="1.4"/>
  <text x="80" y="301" fill="#ffffff" font-size="12">you@school.org</text>

  <!-- password field -->
  <text x="44" y="344" fill="#ffffff" fill-opacity="0.72" font-size="11" font-weight="600">Password</text>
  <rect x="44" y="352" width="232" height="46" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="56" y="389" width="80" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
  <text x="58" y="378" fill="#ffffff" fill-opacity="0.4" font-size="13">••••••••</text>
  <text x="252" y="380" fill="#ffffff" fill-opacity="0.5" font-size="11">👁</text>

  <!-- remember / forgot -->
  <rect x="44" y="412" width="14" height="14" rx="4" fill="#4D9DE0"/>
  <text x="64" y="423" fill="#ffffff" fill-opacity="0.62" font-size="10.5">Remember me</text>
  <text x="276" y="423" text-anchor="end" fill="#4D9DE0" font-size="10.5" font-weight="600">Forgot password?</text>

  <!-- gold button -->
  <rect x="44" y="440" width="232" height="46" rx="13" fill="url(#gold)"/>
  <text x="160" y="468" text-anchor="middle" fill="#00274D" font-size="13" font-weight="800" letter-spacing="1.4">LOGIN</text>

  <!-- divider -->
  <line x1="44" y1="506" x2="120" y2="506" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="160" y="510" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-size="9" letter-spacing="1">OR CONTINUE WITH</text>
  <line x1="200" y1="506" x2="276" y2="506" stroke="#ffffff" stroke-opacity="0.18"/>

  <!-- social row (inside card bottom) -->
  <rect x="44" y="498" width="0" height="0"/>

  <!-- google / apple -->
  <rect x="44" y="520" width="112" height="0" rx="12"/>
  <!-- sign-up prompt -->
  <text x="160" y="566" text-anchor="middle" fill="#ffffff" fill-opacity="0.54" font-size="11">New to FBLA?
    <tspan fill="#4D9DE0" font-weight="800"> Create account</tspan>
  </text>

  <!-- caption -->
  <text x="160" y="636" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" font-size="9">Login — shared design tokens, animated glow, live validation</text>
</svg>
