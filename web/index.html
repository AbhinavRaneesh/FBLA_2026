<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <!--
    Google Sign-In web client id. Replace the placeholder below with your
    actual OAuth 2.0 client ID (Web application) from Google Cloud Console.
    Example: "1234-abcdefg.apps.googleusercontent.com"
  -->
  <meta name="google-signin-client_id" content="REPLACE_WITH_WEB_CLIENT_ID.apps.googleusercontent.com">
  <script>
    (function(){
      try {
        var meta = document.querySelector('meta[name="google-signin-client_id"]');
        if (meta && meta.content && meta.content.indexOf('REPLACE_WITH_WEB_CLIENT_ID') !== -1) {
          console.warn('Google Sign-In meta tag contains placeholder client id — replace it with your real Web OAuth client ID.');
        }
      } catch(e) { /* ignore */ }
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FBLA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FBLA</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
