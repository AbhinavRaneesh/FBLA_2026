name: fbla_member_app
description: Starter FBLA member app (Flutter)
publish_to: "none"

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  flutter_bloc: ^8.1.3
  shared_preferences: ^2.1.1
  url_launcher: ^6.1.10
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  
  # Google Sign-In
  google_sign_in: ^6.3.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Image handling
  image_picker: ^1.0.4
  file_picker: ^8.1.7
  cached_network_image: ^3.3.0
  google_mlkit_image_labeling: ^0.14.2
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # WebView for social media
  webview_flutter: ^4.4.2
  youtube_player_flutter: ^9.1.1
  syncfusion_flutter_pdfviewer: ^31.2.3
  
  # Additional utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  http: ^1.2.2
  csv: ^6.0.0
  lottie: ^3.3.1
  xml: ^6.5.0
  crypto: ^3.0.6
  video_player: ^2.10.1
  video_thumbnail: ^0.5.3
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/logo.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/icons/logo.png
  adaptive_icon_foreground_inset: 20
  web:
    generate: true
    image_path: assets/icons/logo.png
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/home_page_slideshow/1.png
    - assets/home_page_slideshow/2.png
    - assets/home_page_slideshow/3.png
    - assets/home_page_slideshow/4.png
